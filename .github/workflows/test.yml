name: Tests

on:
  push:
    paths:
      - "**.go"
      - go.mod
      - go.sum
      - Makefile
      - "api/**"
      - "config/**"
  pull_request:
    paths:
      - "**.go"
      - go.mod
      - go.sum
      - Makefile
      - "api/**"
      - "config/**"

jobs:
  test:
    name: Run on Ubuntu
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Running Tests
        run: |
          go mod tidy
          make test
