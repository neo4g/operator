# This rule is not used by the project neo4g-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the neo4g.neo4g.io.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: neo4g-operator
    app.kubernetes.io/managed-by: kustomize
  name: neo4gcluster-editor-role
rules:
- apiGroups:
  - neo4g.neo4g.io
  resources:
  - neo4gclusters
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - neo4g.neo4g.io
  resources:
  - neo4gclusters/status
  verbs:
  - get
