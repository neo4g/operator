apiVersion: neo4g.neo4g.io/v1alpha1
kind: Neo4gCluster
metadata:
  name: dev-graph
  namespace: default
spec:
  replicas: 3
  image: "ghcr.io/neo4g/neo4g:latest"
  storage:
    size: "2Gi"
  config:
    poolSize: 1024
    walEnabled: true
    walNoSync: false
    replPollInterval: "500ms"
  resources:
    requests:
      cpu: "250m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  gateway:
    image: "ghcr.io/neo4g/gateway:latest"
    replicas: 1
    heartbeatInterval: "2s"
    heartbeatTimeout: "6s"
    electionDelay: "1s"
