apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "neo4g-operator.fullname" . }}-manager
  labels:
    {{- include "neo4g-operator.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: [pods]
    verbs: [get, list, watch]
  - apiGroups: [""]
    resources: [services]
    verbs: [create, delete, get, list, patch, update, watch]
  - apiGroups: [apps]
    resources: [deployments, statefulsets]
    verbs: [create, delete, get, list, patch, update, watch]
  - apiGroups: [neo4g.neo4g.io]
    resources: [neo4gclusters]
    verbs: [create, delete, get, list, patch, update, watch]
  - apiGroups: [neo4g.neo4g.io]
    resources: [neo4gclusters/finalizers]
    verbs: [update]
  - apiGroups: [neo4g.neo4g.io]
    resources: [neo4gclusters/status]
    verbs: [get, patch, update]
  # Leader election
  - apiGroups: [coordination.k8s.io]
    resources: [leases]
    verbs: [create, get, list, update]
  - apiGroups: [""]
    resources: [events]
    verbs: [create, patch]
